<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{ entry.title }}</title>
  <style>
    :root { --bg: #1c1c1e; --text: #f5f5f7; --text-muted: #98989d; --link: #64d2ff; --accent: #ff9f0a; }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: var(--bg); color: var(--text); line-height: 1.8; }
    main { max-width: 700px; margin: 2rem auto; padding: 0 1rem; }
    h1 { font-family: Georgia, 'Times New Roman', serif; font-size: 1.6rem; line-height: 1.3; margin-bottom: 0.5rem; }
    .meta { color: var(--text-muted); font-size: 0.9rem; margin-bottom: 2rem; }
    .meta a { color: var(--link); text-decoration: none; }
    .content { font-family: Georgia, 'Times New Roman', serif; font-size: 1.05rem; }
    .content img { max-width: 100%; height: auto; border-radius: 8px; margin: 1rem 0; }
    .content p { margin-bottom: 1rem; }
    .content a { color: var(--link); }
    .content pre { background: #2c2c2e; padding: 1rem; overflow-x: auto; border-radius: 8px; }
    .content blockquote { border-left: 3px solid var(--accent); padding-left: 1rem; color: var(--text-muted); }
    .footer { margin-top: 3rem; padding-top: 1rem; border-top: 1px solid #3a3a3c; color: var(--text-muted); font-size: 0.8rem; }
  </style>
</head>
<body>
  <main>
    <article>
      <h1>{{ entry.title }}</h1>
      <div class="meta">
        {{ entry.feed.title if entry.feed else '' }}
        {% if entry.author %} &middot; {{ entry.author }}{% endif %}
        &middot; {{ entry.published_at[:10] if entry.published_at else '' }}
        &middot; <a href="{{ entry.url }}" target="_blank" rel="noopener">Original</a>
      </div>
      <div class="content">
        {{ content | safe }}
      </div>
    </article>
    <div class="footer">Shared via RSS Sidecar</div>
  </main>
</body>
</html>
