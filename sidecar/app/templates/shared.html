<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{ entry.title }}</title>
  <link rel="stylesheet" href="/static/tailwind.css">
  <link rel="stylesheet" href="/static/style.css">
</head>
<body class="bg-bg text-body leading-relaxed">
  <main class="max-w-[700px] mx-auto my-8 px-4">
    <article>
      <h1 class="font-serif text-[1.6rem] leading-snug mb-2">{{ entry.title }}</h1>
      <div class="text-text-muted text-body-sm mb-8">
        {{ entry.feed.title if entry.feed else '' }}
        {% if entry.author %} &middot; {{ entry.author }}{% endif %}
        &middot; {{ entry.published_at[:10] if entry.published_at else '' }}
        &middot; <a href="{{ entry.url }}" target="_blank" rel="noopener" class="text-link no-underline">Original</a>
      </div>
      <div class="entry-content">
        {{ content | safe }}
      </div>
    </article>
    <div class="mt-12 pt-4 border-t border-border text-text-muted text-caption">Shared via RSS Sidecar</div>
  </main>
</body>
</html>
