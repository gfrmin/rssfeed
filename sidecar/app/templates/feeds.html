{% extends "base.html" %}
{% block title %}Feeds{% endblock %}
{% block content %}
<h1>Feeds</h1>
<table>
  <thead>
    <tr>
      <th>Feed</th>
      <th class="col-category">Category</th>
    </tr>
  </thead>
  <tbody>
    {% for feed in feeds %}
    <tr>
      <td>
        <a href="/entries?feed_id={{ feed.id }}">{{ feed.title }}</a>
        <a href="/feeds/{{ feed.id }}" class="feed-settings-link">settings</a>
      </td>
      <td class="col-category">{{ feed.category.title if feed.category else '-' }}</td>
    </tr>
    {% endfor %}
  </tbody>
</table>
{% endblock %}
